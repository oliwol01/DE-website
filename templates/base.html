<!doctype html>
<html lang="en">
  <head>
    <!-- Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Exploring the relationship between nuclear electricity production and carbon emissions across EU countries."
    />

    <!-- Stylesheets -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/stylesheet.css') }}"
    />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Space+Grotesk:wght@400;500;700&family=Sora:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Google Analytics -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-8VBFBVZXZ2"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-8VBFBVZXZ2");
    </script>

    <title>{% block title %}{% endblock %}</title>
  </head>

  <body>
    <!-- Navbar -->
    <nav
      class="navbar navbar-expand-lg bg-transparent position-absolute w-100 px-5 py-5"
    >
      <a class="navbar-brand text-white" href="{{ url_for('home') }}">
        <span class="logo-text fs-4 fw-normal">
          <span class="logo-accent">EU</span> Energy & Emissions
        </span>
      </a>
    </nav>

    <!-- Page content -->
    <main class="container-fluid p-0">{% block content %}{% endblock %}</main>

    <!-- Footer -->
    <footer
      class="border-top border-light border-opacity-10 py-5 px-4 px-lg-5 text-white"
    >
      <div class="container-fluid">
        <div class="row gy-5 justify-content-between align-items-start">
          <!-- Brand -->
          <div class="col-12 col-lg-4">
            <p class="font-heading fw-light mb-0">
              <span class="logo-accent">EU</span> Energy & Emissions
            </p>
          </div>

          <!-- Datasets -->
          <div class="col-12 col-md-6 col-lg-3">
            <div class="d-flex flex-column gap-3">
              <div class="small text-uppercase fw-semibold text-white-50">
                Datasets
              </div>
              <ul class="list-unstyled d-flex flex-column gap-2 mb-0">
                <li>
                  <a
                    href="https://ourworldindata.org/grapher/co-emissions-per-capita?tab=table&time=2007..2024"
                    target="_blank"
                    class="text-decoration-none text-white-50"
                  >
                    CO₂ emissions per capita
                  </a>
                </li>
                <li>
                  <a
                    href="https://ec.europa.eu/eurostat/databrowser/view/nrg_bal_peh__custom_21039157/default/table"
                    target="_blank"
                    class="text-decoration-none text-white-50"
                  >
                    Nuclear energy production
                  </a>
                </li>
              </ul>
            </div>
          </div>

          <!-- My Details -->
          <div class="col-12 col-md-6 col-lg-3">
            <div class="d-flex flex-column gap-3 align-items-lg-end">
              <a
                href="https://github.com/oliwol01"
                target="_blank"
                class="text-decoration-none text-white-50 fs-4"
              >
                <i class="bi bi-github"></i>
              </a>
              <div
                class="d-flex flex-column gap-1 text-white-50 fw-light align-items-lg-end"
              >
                <span>Student 16421728</span>
                <span>© 2026 Oliwia Wolska</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block scripts %}{% endblock %}
  </body>
</html>
